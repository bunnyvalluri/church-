version: '3.8'

services:
  nginx:
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-nginx:latest
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_healthy
      backend-socket:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-frontend:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost}
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-backend:latest
    command: ["node", "api.js"]
    environment:
      - NODE_ENV=production
      - PROCESS_TYPE=api
      - DATABASE_URL=${DATABASE_URL:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=3001
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  backend-socket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-backend:latest
    command: ["node", "socket.js"]
    environment:
      - NODE_ENV=production
      - PROCESS_TYPE=socket
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=3001
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-backend:latest
    command: ["node", "worker.js"]
    environment:
      - NODE_ENV=production
      - PROCESS_TYPE=worker
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  cron:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-bunnyvalluri}/kcm-backend:latest
    command: ["node", "cron.js"]
    environment:
      - NODE_ENV=production
      - PROCESS_TYPE=cron
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_prod_data:
