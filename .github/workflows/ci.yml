name: Continuous Integration (CI) Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build & Code Verification Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Active LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Run ESLint Check
        run: npm run lint

      - name: Compile-Time TypeScript Audit
        run: npx tsc --noEmit

      - name: Verify Next.js Production Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres" # Dummy DB for build compile validation
          DB_OFFLINE: "true"
