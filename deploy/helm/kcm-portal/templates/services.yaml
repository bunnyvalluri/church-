apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: kcm-portal
    component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: kcm-portal
    component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: kcm-portal
    component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: kcm-portal
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-socket
  labels:
    app: kcm-portal
    component: socket
spec:
  type: {{ .Values.socket.service.type }}
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: kcm-portal
    component: socket
