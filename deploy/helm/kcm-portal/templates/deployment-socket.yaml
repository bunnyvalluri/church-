apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-socket
  labels:
    app: kcm-portal
    component: socket
spec:
  replicas: {{ .Values.socket.replicaCount }}
  selector:
    matchLabels:
      app: kcm-portal
      component: socket
  template:
    metadata:
      labels:
        app: kcm-portal
        component: socket
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: socket
          image: "{{ .Values.socket.image.repository }}:{{ .Values.socket.image.tag }}"
          imagePullPolicy: {{ .Values.socket.image.pullPolicy }}
          command: ["node", "socket.js"]
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          # Socket.io can use the /health endpoint as well or a custom socket probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.socket.resources | nindent 12 }}
          env:
            - name: PROCESS_TYPE
              value: "socket"
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
