apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-frontend-ingress
spec:
  podSelector:
    matchLabels:
      app: kcm-portal
      component: frontend
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx # Assuming ingress-nginx is used
    ports:
    - protocol: TCP
      port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-api-ingress
spec:
  podSelector:
    matchLabels:
      app: kcm-portal
      component: api
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: kcm-portal
          component: frontend
    ports:
    - protocol: TCP
      port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-socket-ingress
spec:
  podSelector:
    matchLabels:
      app: kcm-portal
      component: socket
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: kcm-portal
          component: frontend
    - podSelector:
        matchLabels:
          app: kcm-portal
          component: api
    ports:
    - protocol: TCP
      port: 3001
