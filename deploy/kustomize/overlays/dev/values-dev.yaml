frontend:
  replicaCount: 1
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

api:
  replicaCount: 1
  autoscaling:
    enabled: false

socket:
  replicaCount: 1
  autoscaling:
    enabled: false

worker:
  replicaCount: 1

cron:
  enabled: false

ingress:
  hosts:
    - host: api.dev.kcmchurch.local
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        - path: /socket.io
          pathType: Prefix
          backend: socket
    - host: dev.kcmchurch.local
      paths:
        - path: /
          pathType: Prefix
          backend: frontend
  tls:
    - secretName: kcmchurch-dev-tls
      hosts:
        - dev.kcmchurch.local
        - api.dev.kcmchurch.local

env:
  NODE_ENV: development
